# Legacy filename kept because the server already deploys with this path.
# Current main-server deployment includes ai-service and MongoDB.
services:
  frontend:
    build:
      context: ../../frontend
      args:
        VITE_GATEWAY_BASE_URL: /
        VITE_PYTHON_BASE_URL: /py-api
        VITE_AI_SERVICE_BASE_URL: /ai-api
        VITE_ENABLE_PYTHON_PUBLIC_FALLBACK: ${VITE_ENABLE_PYTHON_PUBLIC_FALLBACK:-false}
    container_name: emohealing-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - python-backend
      - ai-service
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: emohealing-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  api-gateway:
    build: ../../api-gateway
    container_name: emohealing-api-gateway
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
      SPRING_PROFILES_ACTIVE: prod
      USER_SERVICE_URL: http://user-service:8082
      MUSIC_SERVICE_URL: http://music-service:8081
      SOCIAL_SERVICE_URL: http://social-service:8083
      DATA_SERVICE_URL: http://data-service:8084
      MEDITATION_SERVICE_URL: http://meditation-service:8085
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:${GATEWAY_DEBUG_PORT:-8080}:8080"
    restart: unless-stopped

  user-service:
    build: ../../user-service
    container_name: emohealing-user-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${USER_DB_NAME:-emohealing_user_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin123456}
      ADMIN_BOOTSTRAP_FORCE: ${ADMIN_BOOTSTRAP_FORCE:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - user_uploads:/app/uploads
    depends_on:
      - rabbitmq
    restart: unless-stopped

  music-service:
    build: ../../music-service
    container_name: emohealing-music-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${MUSIC_DB_NAME:-emohealing_music_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    restart: unless-stopped

  social-service:
    build: ../../social-service
    container_name: emohealing-social-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${SOCIAL_DB_NAME:-emohealing_social_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped

  meditation-service:
    build: ../../meditation-service
    container_name: emohealing-meditation-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${MEDITATION_DB_NAME:-emohealing_meditation_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - rabbitmq
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: emohealing-ai-mongodb
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  data-service:
    build: ../../data-service
    container_name: emohealing-data-service
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC -Dspring.data.mongodb.uri=mongodb://root:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DATA_MONGO_DB:-emohealing_log_db}?authSource=admin -Dspring.mongodb.uri=mongodb://root:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DATA_MONGO_DB:-emohealing_log_db}?authSource=admin"
      SPRING_PROFILES_ACTIVE: prod
      MONGO_URI: "mongodb://root:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DATA_MONGO_DB:-emohealing_log_db}?authSource=admin"
      SPRING_DATA_MONGODB_URI: "mongodb://root:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DATA_MONGO_DB:-emohealing_log_db}?authSource=admin"
    depends_on:
      - mongodb
    restart: unless-stopped

  python-backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.deploy
    container_name: emohealing-python-backend
    environment:
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - python_uploaded_music:/app/uploaded_music
    restart: unless-stopped

  ai-service:
    build:
      context: ../../AI-service/backend
      dockerfile: Dockerfile.deploy
    container_name: emohealing-ai-service
    environment:
      AI_SERVICE_PORT: 5001
      JWT_SECRET: ${JWT_SECRET}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      SILICONFLOW_TTS_MODEL: ${SILICONFLOW_TTS_MODEL:-FunAudioLLM/CosyVoice2-0.5B}
      SILICONFLOW_TTS_VOICE: ${SILICONFLOW_TTS_VOICE:-FunAudioLLM/CosyVoice2-0.5B:alex}
      EMOTION_SERVICE_URL: ${EMOTION_SERVICE_URL}
      MUSIC_SERVICE_URL: http://api-gateway:8080/api/music/v1
      MONGO_URI: mongodb://root:${MONGO_ROOT_PASSWORD}@mongodb:27017/${AI_MONGO_DB:-comprehensive_project}?authSource=admin
      MONGO_DB: ${AI_MONGO_DB:-comprehensive_project}
      MONGO_COLLECTION: ${AI_MONGO_COLLECTION:-ai_chat_log}
    volumes:
      - ai_generated_audio:/app/generated_audio
    depends_on:
      - mongodb
      - api-gateway
      - music-service
    restart: unless-stopped

volumes:
  rabbitmq_data:
  user_uploads:
  mongo_data:
  python_uploaded_music:
  ai_generated_audio:
