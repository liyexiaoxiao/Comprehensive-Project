server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: http://localhost:8082  # 注意：这里是下游微服务的真实地址
          predicates:
            - Path=/api/users/**, /api/admin/**
        - id: music-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/music/**
          filters:
            - RewritePath=/api/music/(?<segment>.*), /api/$\{segment}
        - id: social-service-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/social/**
          filters:
            - RewritePath=/api/social/(?<segment>.*), /api/$\{segment}

jwt:
  secret: this-is-a-secret-key-for-development-only-when-using-production-environment-secret-should-be-injected-via-environment-variable