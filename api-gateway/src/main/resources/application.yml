server:
  port: 8080 # 网关占据 8080 端口

spring:
  application:
    name: api-gateway

  profiles:
    active: dev

  codec:
    max-in-memory-size: 20MB

  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**, /api/admin/**
        - id: music-service-route
          uri: ${MUSIC_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/music/**
          filters:
            - RewritePath=/api/music/(?<segment>.*), /api/$\{segment}
        - id: social-service-route
          uri: ${SOCIAL_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/social/**
          filters:
            - RewritePath=/api/social/(?<segment>.*), /api/$\{segment}
        - id: data-service-route
          uri: ${DATA_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/data/**
          filters:
            - RewritePath=/api/data/(?<segment>.*), /api/$\{segment}
        - id: meditation-service-route
          uri: ${MEDITATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/meditation/**
          filters:
            - RewritePath=/api/meditation/(?<segment>.*), /api/$\{segment}

# 必须和 User-Service 保持完全一致的密钥，否则网关无法解密
jwt:
  secret: ${JWT_SECRET:this-is-a-secret-key-for-development-only-when-using-production-environment-secret-should-be-injected-via-environment-variable}
