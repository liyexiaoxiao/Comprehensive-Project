spring:
  application:
    name: music-service

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:emohealing_music_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:004076}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${DASHSCOPE_CAPTION_MODEL:qwen3-omni-30b-a3b-captioner}
  max-audio-bytes: ${DASHSCOPE_MAX_AUDIO_BYTES:20971520}
  fetch-localhost-audio: true
